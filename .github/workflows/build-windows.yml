name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Lay source code
        uses: actions/checkout@v4

      - name: Cai Node.js LTS 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Tu dong tim thu muc app
        id: appdir
        shell: pwsh
        run: |
          if (Test-Path "package.json") {
            "dir=." >> $env:GITHUB_OUTPUT
            Write-Host "Tim thay app o ROOT"
          } elseif (Test-Path "AppKhoNhieuLoc_BUILD_READY/package.json") {
            "dir=AppKhoNhieuLoc_BUILD_READY" >> $env:GITHUB_OUTPUT
            Write-Host "Tim thay app trong AppKhoNhieuLoc_BUILD_READY"
          } else {
            Write-Host "KHONG TIM THAY package.json"
            Get-ChildItem
            exit 1
          }

      - name: Kiem tra file app
        shell: pwsh
        working-directory: ${{ steps.appdir.outputs.dir }}
        run: |
          Get-Location
          Get-ChildItem
          foreach ($f in @("package.json","main.js","preload.js","LenhKho_Template.xlsx","PhieuXuat_Template.xlsx","Bill_Template.xlsm","ChuyenKho_Template.xlsx")) {
            if (!(Test-Path $f)) {
              Write-Host "THIEU FILE: $f"
              exit 1
            }
          }

      - name: Sua package.json ve phien ban co dinh
        shell: pwsh
        working-directory: ${{ steps.appdir.outputs.dir }}
        run: |
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json

          if (-not $pkg.devDependencies) {
            $pkg | Add-Member -MemberType NoteProperty -Name devDependencies -Value ([pscustomobject]@{})
          }
          $pkg.devDependencies | Add-Member -MemberType NoteProperty -Name electron -Value "31.7.7" -Force
          $pkg.devDependencies | Add-Member -MemberType NoteProperty -Name "electron-builder" -Value "25.1.8" -Force

          if (-not $pkg.build) {
            $pkg | Add-Member -MemberType NoteProperty -Name build -Value ([pscustomobject]@{})
          }
          $pkg.build | Add-Member -MemberType NoteProperty -Name electronVersion -Value "31.7.7" -Force
          $pkg.build | Add-Member -MemberType NoteProperty -Name asar -Value $false -Force

          if (-not $pkg.scripts) {
            $pkg | Add-Member -MemberType NoteProperty -Name scripts -Value ([pscustomobject]@{})
          }
          $pkg.scripts | Add-Member -MemberType NoteProperty -Name build -Value "electron-builder --win nsis portable --x64 --publish never" -Force

          $pkg | ConvertTo-Json -Depth 30 | Set-Content package.json -Encoding UTF8
          Get-Content package.json

      - name: Cai thu vien
        shell: cmd
        working-directory: ${{ steps.appdir.outputs.dir }}
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          npm_config_electron_mirror: https://npmmirror.com/mirrors/electron/
        run: |
          npm config set ignore-scripts false
          npm config set fund false
          npm config set audit false
          call npm install --foreground-scripts --force
          call npm install electron@31.7.7 electron-builder@25.1.8 --save-dev --foreground-scripts --force
          call npm list electron electron-builder --depth=0

      - name: Build file cai dat EXE
        shell: cmd
        working-directory: ${{ steps.appdir.outputs.dir }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          npm_config_electron_mirror: https://npmmirror.com/mirrors/electron/
        run: |
          call npx --yes electron-builder@25.1.8 --win nsis portable --x64 --publish never

      - name: Luu file cai dat de tai ve
        uses: actions/upload-artifact@v4
        with:
          name: AppKhoNhieuLoc-Windows-EXE
          path: |
            ${{ steps.appdir.outputs.dir }}/dist/*.exe
            ${{ steps.appdir.outputs.dir }}/dist/*.blockmap
          if-no-files-found: error
